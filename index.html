<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulatore Finestra di Contesto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Simulatore Finestra di Contesto</h1>
            <div class="controls">
                <label for="context-limit">Limite Token:</label>
                <select id="context-limit">
                    <option value="200">200 Token</option>
                    <option value="500" selected>500 Token</option>
                    <option value="1000">1000 Token</option>
                </select>
            </div>
        </header>
        
        <div id="chat-container">
            </div>
        
        <div class="input-area">
            <textarea id="user-input" placeholder="Scrivi un messaggio..."></textarea>
            <button id="send-btn">Invia</button>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
